name: Codespace CI

on:
  push:
    branches:
      - main
    paths:
      - ".devcontainer/**"
      - ".vscode/**"
      - "backend/**"
      - "daemon/**"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/codespace-ci.yml"
  pull_request:
    paths:
      - ".devcontainer/**"
      - ".vscode/**"
      - "backend/**"
      - "daemon/**"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/codespace-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Python workspace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Validate imports
        run: |
          python - <<'PY'
          import backend.main
          import daemon.local_daemon
          print('backend and daemon imports ok')
          PY

      - name: Backend health smoke test
        run: |
          uvicorn backend.main:app --host 127.0.0.1 --port 8787 > /tmp/cyntra-backend.log 2>&1 &
          BACKEND_PID=$!
          sleep 3
          curl --fail http://127.0.0.1:8787/health
          kill $BACKEND_PID

      - name: Dashboard static page check
        run: |
          test -f docs/index.html
          test -f docs/realtime-machine.js
          test -f docs/realtime-machine.css
